spring:
  application:
    name: market-replay-engine

  datasource:
    url: jdbc:postgresql://localhost:5432/marketreplay
    username: mreplay
    password: mreplay_secret
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: MarketReplayHikariPool

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
          batch_size: 500
        order_inserts: true
        order_updates: true
        format_sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: true

server:
  port: 8080
  tomcat:
    threads:
      max: 200

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# Application-specific configuration
app:
  replay:
    scheduler-threads: 16
    max-tick-delay-ms: 5000
    buffer-wait-ms: 50
  buffer:
    chunk-size: 500
    refill-threshold: 100
  seed:
    enabled: true

logging:
  level:
    com.marketreplay: DEBUG
    org.springframework.web.socket: INFO
    org.hibernate.SQL: WARN
    org.flywaydb: INFO
